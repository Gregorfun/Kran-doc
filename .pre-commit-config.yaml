# Pre-commit Hooks für PDFDoc / Kran-Tools
# 
# Installation:
#   pip install pre-commit
#   pre-commit install
#
# Manuelles Ausführen:
#   pre-commit run --all-files

repos:
  # Allgemeine Code-Qualität
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Trailing Whitespace entfernen
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      
      # Dateien müssen mit Newline enden
      - id: end-of-file-fixer
      
      # YAML-Dateien prüfen
      - id: check-yaml
        args: [--safe]
      
      # JSON-Dateien prüfen
      - id: check-json
      
      # Große Dateien verhindern
      - id: check-added-large-files
        args: [--maxkb=2000]
      
      # Merge-Konflikte erkennen
      - id: check-merge-conflict
      
      # Python-Syntax prüfen
      - id: check-ast
      
      # Case-Konflikte bei Dateinamen
      - id: check-case-conflict
      
      # Keine Dateien direkt zu Git hinzufügen
      - id: check-executables-have-shebangs
      
      # Private Keys nicht committen
      - id: detect-private-key
      
      # UTF-8 BOM entfernen
      - id: fix-byte-order-marker
      
      # Requirements sortieren
      - id: requirements-txt-fixer

  # Python Code-Formatierung
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=120]
        exclude: ^(venv/|env/|\.venv/|build/|dist/)

  # Import-Sortierung
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=120]
        exclude: ^(venv/|env/|\.venv/|build/|dist/)

  # Flake8 - Python Linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [
          --max-line-length=120,
          --extend-ignore=E203,W503,  # Black-Kompatibilität
          --exclude=venv,env,.venv,build,dist,__pycache__
        ]

  # MyPy - Static Type Checking (optional, kann aktiviert werden)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       args: [--ignore-missing-imports, --no-strict-optional]
  #       additional_dependencies: [types-all]
  #       exclude: ^(venv/|env/|\.venv/|build/|dist/|tests/)

# CI Skip: Ermöglicht schnelles Committen ohne Hooks
# git commit --no-verify -m "message"
