# Pytest Konfiguration für Kran-Tools

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers für unterschiedliche Test-Typen
markers =
    unit: Unit-Tests (schnell, isoliert)
    integration: Integration-Tests (langsamer, mit Dependencies)
    performance: Performance-Tests
    slow: Langsame Tests

# Coverage-Einstellungen
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Minimale Coverage für Erfolg
# --cov-fail-under=70

# Test-Discovery
norecursedirs = .git .venv venv env build dist *.egg-info __pycache__ output input

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeouts für langsame Tests
timeout = 300

# Parallel ausführen (optional, erfordert pytest-xdist)
# addopts = -n auto
