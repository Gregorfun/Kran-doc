<div id="contact-modal" class="modal" aria-hidden="true">
  <div class="modal-backdrop" data-close="1"></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="contact-title">
    <div class="modal-header">
      <h2 id="contact-title">Kontakt</h2>
      <button type="button" class="modal-close" data-close="1" aria-label="Schliessen">&times;</button>
    </div>
    <form id="contact-form" class="modal-body">
      <label for="contact-name" class="field-label">Name</label>
      <input id="contact-name" name="name" type="text" placeholder="Optional">

      <label for="contact-email" class="field-label">E-Mail (optional)</label>
      <input id="contact-email" name="email" type="email" placeholder="Optional">

      <label for="contact-message" class="field-label">Nachricht</label>
      <textarea id="contact-message" name="message" rows="4" maxlength="1500" required></textarea>

      <div id="contact-status" class="search-status"></div>
      <div class="modal-actions">
        <button type="button" class="btn" data-close="1">Abbrechen</button>
        <button type="submit" class="btn primary">Senden</button>
      </div>
    </form>
  </div>
</div>
