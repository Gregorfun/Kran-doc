<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kran-Doc Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Kran-Doc Login</h1>
      <p>Bitte PIN eingeben.</p>
    </header>
    <main class="page-main">
      <section class="card section login-card">
        {% if error %}
          <p class="status-warn">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('login', next=next_param) }}">
          <label for="pin" class="field-label">PIN</label>
          <input id="pin" name="pin" type="password" autocomplete="current-password">
          <div class="actions-grid">
            <button type="submit" class="btn primary">Login</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <button id="contact-open" class="btn contact-fab" type="button">Kontakt</button>
  {% include "_contact_modal.html" %}
  <script src="{{ url_for('static', filename='contact.js') }}"></script>
</body>
</html>
